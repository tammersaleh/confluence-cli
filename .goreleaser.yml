version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: confluence
    main: ./cmd/confluence
    binary: confluence
    env:
      - CGO_ENABLED=0
    goos: [darwin, linux]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X github.com/tammersaleh/confluence-cli/internal/cli.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}

checksum:
  name_template: "checksums.txt"

release:
  mode: append

homebrew_casks:
  - name: confluence-cli
    binaries:
      - confluence
    repository:
      owner: tammersaleh
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Casks
    homepage: https://github.com/tammersaleh/confluence-cli
    description: Agent-first Confluence CLI
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/confluence"]
          end
