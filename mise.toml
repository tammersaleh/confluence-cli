[tools]
go = "1.24"

[tasks.build]
run = "go build -o confluence ./cmd/confluence"

[tasks.test]
run = "go test ./..."

[tasks.check]
depends = ["test", "build"]

[tasks."test:race"]
run = "go test -race ./..."

[tasks."test:cover"]
run = "go test -coverprofile=coverage.out ./... && go tool cover -html=coverage.out -o coverage.html"

[tasks."test:int"]
run = "go test -tags=integration ./..."

[tasks.lint]
run = "golangci-lint run"

[tasks.fmt]
run = "gofmt -w . && goimports -w ."

[tasks.generate]
run = "go generate ./..."

[tasks.clean]
run = "rm -rf bin/ coverage.out coverage.html"
